name: Build and Publish GHCR

on:
  push:
    branches: [ "main", "release" ]
    tags: [ "v*" ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/ruleforge"
          SHORT_SHA="${GITHUB_SHA::12}"

          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            echo "tags=${IMAGE}:main,${IMAGE}:main-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_REF}" == "refs/heads/release" ]]; then
            echo "tags=${IMAGE}:prod,${IMAGE}:prod-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            TAG_NAME="${GITHUB_REF#refs/tags/}"
            echo "tags=${IMAGE}:${TAG_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "tags=${IMAGE}:main-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.tags.outputs.tags }}
